kind = "web"
previewPath = "/"
title = "Cafetería La Flor de Córdoba"
version = "1.0.0"
id = "artifacts/cafeteria-flor-cordoba"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20897

[services.development]
run = "pnpm --filter @workspace/cafeteria-flor-cordoba run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cafeteria-flor-cordoba", "run", "build" ]
publicDir = "artifacts/cafeteria-flor-cordoba/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20897"
BASE_PATH = "/"
